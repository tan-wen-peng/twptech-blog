<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b0a0a"/>
      <stop offset="50%" stop-color="#3d1313"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <linearGradient id="accent6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff416c"/>
      <stop offset="100%" stop-color="#ff4b2b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="315" fill="url(#bg6)"/>
  <!-- leak visualization -->
  <rect x="150" y="100" width="300" height="120" rx="8" fill="none" stroke="url(#accent6)" stroke-width="1" opacity="0.2"/>
  <rect x="170" y="120" width="60" height="40" rx="4" fill="none" stroke="#ff416c" stroke-width="1" opacity="0.5"/>
  <text x="200" y="145" font-family="monospace" font-size="8" fill="rgba(255,65,108,0.6)" text-anchor="middle">HImage</text>
  <rect x="250" y="120" width="60" height="40" rx="4" fill="none" stroke="#ff416c" stroke-width="1" opacity="0.5"/>
  <text x="280" y="145" font-family="monospace" font-size="8" fill="rgba(255,65,108,0.6)" text-anchor="middle">HRegion</text>
  <rect x="330" y="120" width="60" height="40" rx="4" fill="none" stroke="#ff416c" stroke-width="1" opacity="0.5"/>
  <text x="360" y="145" font-family="monospace" font-size="8" fill="rgba(255,65,108,0.6)" text-anchor="middle">HXLD</text>
  <rect x="410" y="120" width="30" height="40" rx="4" fill="none" stroke="#ff416c" stroke-width="1" opacity="0.5"/>
  <text x="425" y="145" font-family="monospace" font-size="8" fill="rgba(255,65,108,0.6)" text-anchor="middle">…</text>
  <!-- memory bar growing -->
  <rect x="170" y="195" width="40" height="6" fill="#ff416c" opacity="0.3"/>
  <rect x="230" y="195" width="60" height="6" fill="#ff416c" opacity="0.4"/>
  <rect x="310" y="195" width="80" height="6" fill="#ff416c" opacity="0.5"/>
  <rect x="410" y="195" width="30" height="6" fill="#ff416c" opacity="0.6"/>
  <text x="300" y="240" font-family="monospace" font-size="10" fill="rgba(255,65,108,0.5)" text-anchor="middle">OutOfMemoryException</text>
</svg>
