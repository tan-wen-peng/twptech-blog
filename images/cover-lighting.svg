<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
  </defs>
  <rect width="600" height="315" fill="url(#bg3)"/>
  <!-- light cone -->
  <polygon points="300,80 200,260 400,260" fill="none" stroke="url(#accent3)" stroke-width="1" opacity="0.15"/>
  <ellipse cx="300" cy="260" rx="100" ry="15" fill="none" stroke="url(#accent3)" stroke-width="1" opacity="0.2"/>
  <circle cx="300" cy="90" r="15" fill="none" stroke="url(#accent3)" stroke-width="1.5" opacity="0.6"/>
  <circle cx="300" cy="90" r="5" fill="url(#accent3)" opacity="0.8"/>
  <!-- subjects -->
  <rect x="150" y="200" width="80" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="190" y="224" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">金属</text>
  <rect x="260" y="210" width="80" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="300" y="234" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">塑料</text>
  <rect x="370" y="200" width="80" height="40" rx="3" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="410" y="224" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle">PCB</text>
  <text x="300" y="280" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">打光不是玄学</text>
</svg>
