baseURL = "https://www.twptech.site/"
locale = "zh-CN"
title = "TWP技术笔记 · 视觉·PLC·运动控制"
theme = "PaperMod"
defaultContentLanguage = "zh"
enableInlineShortcodes = true
enableRobotsTXT = true
hasCJKLanguage = true

[params]
  description = "机械结构设计 | Creo参数化建模 | 工程图自动化 — 只讲产线上真实趟过的坑"
  author = "TWP"
  keywords = ["机械结构设计","Creo","参数化建模","Top-Down设计","工程图自动化","BOM体系","SolidWorks","Creo二次开发","结构仿真","工业自动化","机械工程师","结构设计"]
  DateFormat = "2006-01-02"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  mainSections = ["posts"]
  disableSpecial1stPost = false
  ShowRelatedPosts = true
  relatedPostsLimit = 5
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  # Fuse.js 搜索参数
  [params.fuseOpts]
    isCaseSensitive = false
    includeScore = true
    includeMatches = true
    shouldSort = true
    findAllMatches = true
    minMatchCharLength = 2
    threshold = 0.3
    distance = 200
    ignoreLocation = true
    keys = ["title", "permalink", "summary", "content"]

  [params.homeInfoParams]
    Title = "TWP技术笔记"
    Content = """
**视觉 · PLC · 运动控制**

产线上踩过的坑、淌过的雷，才是工程师最值钱的资产。

本站只聊机器视觉、PLC、运动控制、机械设计与工业现场调试。  
C# / C++ 为主，Halcon 是核心工具。不聊前端、不写 AI 玩具、不讲 Linux 运维。
"""

  [[params.socialIcons]]
    name = "github"
    title = "GitHub"
    url = "https://github.com/tan-wen-peng"

  [[params.socialIcons]]
    name = "email"
    title = "联系我"
    url = "mailto:2129336720@qq.com"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  # editPost 暂不启用（GitHub Pages 遗留）
  #[params.editPost]
  #  URL = "https://github.com/tan-wen-peng/twptech-blog/content"
  #  Text = "建议修改"
  #  appendFilePath = true

  [params.label]
    text = "TWP技术笔记"
    icon = "/logo.svg"
    iconHeight = 35

  # Google Analytics（填写 GA 测量 ID 后启用）
  [params.analytics.google]
      SiteVerificationTag = ""

  [params.assets]
    favicon = "/logo.svg"
    apple_touch_icon = "/apple-touch-icon.png"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "📂 文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "series"
    name = "📚 系列"
    url = "/series/"
    weight = 20

  [[menu.main]]
    identifier = "download"
    name = "📥 下载"
    url = "/download/"
    weight = 30

  [[menu.main]]
    identifier = "about"
    name = "👤 关于"
    url = "/about/"
    weight = 40

  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/tan-wen-peng"
    weight = 55

  [[menu.main]]
    identifier = "search"
    name = "🔍"
    url = "/search/"
    weight = 60

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[related]
  includeNewer = true
  threshold = 50
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 80

  [[related.indices]]
    name = "categories"
    weight = 50

[[related.indices]]
  name = "keywords"
  weight = 30

# SEO & Sitemap
[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    lineNumbersInTable = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = true

  [privacy.vimeo]
    disabled = true
  [privacy.twitter]
    disabled = false
  [privacy.instagram]
    disabled = true
  [privacy.youtube]
    disabled = true
