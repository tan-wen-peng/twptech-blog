<script>
// Copy code[data-lang] to parent <pre> for CSS ::before
(function() {
  document.querySelectorAll('pre code[data-lang]').forEach(function(el) {
    var lang = el.getAttribute('data-lang');
    if (lang && el.parentNode && el.parentNode.tagName === 'PRE') {
      el.parentNode.setAttribute('data-lang', lang);
    }
  });
})();
</script>
