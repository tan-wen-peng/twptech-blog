{{- /* Gitalk 评论系统 */}}
{{- if (.Params.comments | default true) }}
{{- $gitalkOwner := "tan-wen-peng" }}
{{- $gitalkRepo := "twptech-blog-comments" }}
{{- $gitalkClientID := "" }}
{{- $gitalkClientSecret := "" }}
<div id="gitalk-container"></div>
<link rel="stylesheet" href="https://unpkg.com/gitalk/dist/gitalk.css" />
<script src="https://unpkg.com/gitalk/dist/gitalk.min.js"></script>
<script>
  (function() {
    // 仅在配置了 clientID 时才初始化
    if (!"{{ $gitalkClientID }}") return;
    var gitalk = new Gitalk({
      clientID: "{{ $gitalkClientID }}",
      clientSecret: "{{ $gitalkClientSecret }}",
      repo: "{{ $gitalkRepo }}",
      owner: "{{ $gitalkOwner }}",
      admin: ["{{ $gitalkOwner }}"],
      id: location.pathname.replace(/[^a-zA-Z0-9]/g, '').slice(0, 50),
      distractionFreeMode: false
    });
    gitalk.render('gitalk-container');
  })();
</script>
<noscript>请启用 JavaScript 以查看评论。</noscript>
{{- end }}
